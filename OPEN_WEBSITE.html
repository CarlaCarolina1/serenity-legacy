<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity Legacy Preview</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at 20% 20%, rgba(184, 137, 51, 0.12), rgba(0,0,0,0)),
                        radial-gradient(circle at 80% 0%, rgba(197, 164, 109, 0.14), rgba(0,0,0,0)),
                        #0a0a0a;
            color: #e7e3d7;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(184, 137, 51, 0.35);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
        }
        h1 {
            margin: 0 0 0.5rem 0;
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 500;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #C5A46D 0%, #D4AF37 45%, #B88933 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            margin: 0 0 1.25rem 0;
            font-weight: 500;
            color: #cfc8b5;
        }
        .button {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #B88933 0%, #D4AF37 45%, #A67C00 100%);
            color: #0a0a0a;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            margin: 0.5rem;
            transition: transform 0.2s;
            box-shadow: 0 8px 22px rgba(184, 137, 51, 0.28);
            border: 1px solid rgba(212, 175, 55, 0.35);
        }
        .button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 12px 26px rgba(184, 137, 51, 0.35);
        }
        .button-primary {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e7e3d7;
            border: 1px solid rgba(184, 137, 51, 0.35);
        }
        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            opacity: 0.8;
            color: #cfc8b5;
        }
        .note {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: #b8b2a0;
            line-height: 1.5;
        }
        code {
            background: rgba(255,255,255,0.06);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            border: 1px solid rgba(184,137,51,0.25);
            color: #e7e3d7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Serenity Legacy Preview</h1>
        <h2>Local vs Live</h2>
        <a href="http://localhost:5173" class="button" target="_blank" id="openBtn">
            Open Local (localhost:5173)
        </a>
        <a href="https://www.serenitylegacy.net" class="button button-primary" target="_blank" rel="noopener">
            View Live Site
        </a>
        <div class="status" id="status">
            Checking if server is running...
        </div>
        <div class="note">
            If not running, start from repo root:<br/>
            <code>cd "C:\Users\Yacaman.LEX\Desktop\Carlas Website\frontend"</code><br/>
            <code>npm install</code><br/>
            <code>npm run dev -- --host --port 5173</code>
        </div>
    </div>
    <script>
        // Try to open in Chrome specifically
        const openBtn = document.getElementById('openBtn');
        const status = document.getElementById('status');
        
        // Check if server is running
        fetch('http://localhost:5173')
            .then(() => {
                status.textContent = '✅ Local dev server is running. Click "Open Local".';
                status.style.color = '#4ade80';
            })
            .catch(() => {
                status.textContent = '⚠️ Local server not running. Start: npm run dev (frontend)';
                status.style.color = '#fbbf24';
            });
        
        // Auto-open on page load (optional - uncomment if you want it)
        // window.open('http://localhost:5173', '_blank');
    </script>
</body>
</html>
